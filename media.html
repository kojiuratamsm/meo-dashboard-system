<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapOn Media - お店の魅力を届ける</title>
    <link rel="icon" href="mapon-logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2B6CB0;
            --primary-hover: #2C5282;
            --bg-main: #FFFFFF;
            --bg-sub: #F7FAFC;
            --text-main: #2D3748;
            --text-muted: #718096;
            --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        body { background-color: var(--bg-sub); color: var(--text-main); line-height: 1.6; }

        .header-container { max-width: 100%; margin: 0 auto; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; color: var(--primary); cursor: pointer; padding: 5px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 35px; }
        
        .header-search { display: flex; gap: 10px; }
        .header-search input { padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; width: 250px; }
        .header-search button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        .container { max-width: 100%; margin: 0; padding: 0; min-height: calc(100vh - 75px); display: flex; flex-direction: row; }
        .main-col { flex: 1; padding: 40px; background: #F7FAFC; }
        .sidebar-col { width: 300px; padding: 40px 20px; background: var(--bg-main); border-right: 1px solid var(--border); }
        
        /* Hero Concept */
        .hero-concept { background: linear-gradient(135deg, #1A365D, #2B6CB0); color: white; border-radius: 24px; padding: 80px 40px; margin-bottom: 40px; text-align: center; box-shadow: 0 15px 40px rgba(26,54,93,0.3); position: relative; overflow: hidden; animation: fadeIn 1s ease-out; }
        .hero-concept::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); transform: rotate(30deg); }
        .hero-concept h1 { font-size: 36px; font-weight: 900; margin-bottom: 25px; letter-spacing: 2px; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.2); line-height: 1.4; word-break: auto-phrase; }
        .hero-concept p { font-size: 16px; line-height: 1.8; opacity: 0.95; max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
        
        .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .feature-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .feature-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .feature-card i { font-size: 30px; color: #63B3ED; margin-bottom: 15px; }
        .feature-card h3 { font-size: 18px; margin-bottom: 10px; }
        .feature-card p { font-size: 13px; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Blog List */
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .blog-card { background: var(--bg-main); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: #2D3748; display: flex; flex-direction: column; border: 1px solid var(--border); }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--primary); }
        .blog-img { width: 100%; height: 200px; object-fit: cover; }
        .blog-content { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .blog-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; line-height: 1.5; }
        .blog-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); margin-top: auto; }
        .blog-category-badge { display: inline-block; padding: 4px 10px; background: #EBF8FF; color: var(--primary); border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 15px; align-self: flex-start; }

        /* Article Detail */
        .article-container { background: var(--bg-main); border-radius: 24px; padding: 60px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .article-title { font-size: 32px; font-weight: 900; color: #2D3748; margin-bottom: 25px; line-height: 1.4; }
        .article-meta { display: flex; gap: 20px; font-size: 14px; color: var(--text-muted); margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .article-image { width: 100%; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .article-body { font-size: 16px; line-height: 2; color: #4A5568; }
        .article-body h2 { font-size: 24px; color: #2D3748; margin: 50px 0 20px; padding-bottom: 10px; border-bottom: 2px solid var(--primary); }
        .article-body h3 { font-size: 20px; margin: 30px 0 15px; }
        .article-body p { margin-bottom: 20px; }
        .article-body img { max-width: 100%; height: auto; border-radius: 12px; margin: 20px 0; }
        
        .article-category-badge { display: inline-block; padding: 6px 15px; background: #EBF8FF; color: var(--primary); border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 30px; text-decoration: none; transition: 0.2s; }
        .article-category-badge:hover { background: var(--primary); color: white; }

        /* Store Card */
        .store-card { background: #F7FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 30px; margin-top: 50px; }
        .store-card h3 { font-size: 20px; color: #2D3748; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .store-info { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .store-info div { display: flex; align-items: flex-start; gap: 15px; font-size: 15px; color: #4A5568; }
        .store-info i { color: var(--primary); margin-top: 4px; }
        .btn-reserve { display: block; width: 100%; text-align: center; background: linear-gradient(135deg, #3182CE, #2B6CB0); color: white; padding: 15px; border-radius: 12px; font-weight: 700; text-decoration: none; transition: 0.3s; font-size: 16px; }
        .btn-reserve:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(49, 130, 206, 0.3); }

        .author-box { display: flex; align-items: center; gap: 15px; margin-top: 40px; padding-top: 30px; border-top: 1px dashed var(--border); }
        .author-avatar { width: 50px; height: 50px; background: #EDF2F7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #A0AEC0; }
        .author-info h4 { font-size: 15px; font-weight: 700; color: #2D3748; }
        .author-info p { font-size: 12px; color: var(--text-muted); }

        /* Loader */
        .loader { text-align: center; padding: 50px; color: var(--primary); font-size: 24px; }

        /* Sidebar Widgets */
        .widget { background: transparent; border-radius: 0; padding: 0; margin-bottom: 30px; border: none; box-shadow: none; position: sticky; top: 120px; }
        .widget h3 { font-size: 16px; font-weight: 700; color: #2D3748; margin-bottom: 15px; border-bottom: 2px solid #EDF2F7; padding-bottom: 10px; }
        .category-list { list-style: none; }
        .category-list li { margin-bottom: 15px; }
        .category-list a { color: #4A5568; text-decoration: none; font-size: 15px; font-weight: 500; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; background: #F7FAFC; }
        .category-list a:hover { color: var(--primary); background: #EBF8FF; transform: translateX(5px); }

        /* Footer */
        .site-footer { background: #4A4A4A; color: white; padding: 40px; margin-top: auto; font-family: sans-serif; position: relative; width: 100%; box-sizing: border-box; }
        .footer-container { max-width: 1200px; margin: 0 auto; position: relative; min-height: 150px; }
        .footer-links { position: absolute; left: 0; top: 0; display: flex; flex-direction: column; gap: 15px; }
        .footer-links a { color: white; text-decoration: none; font-size: 14px; transition: opacity 0.2s; }
        .footer-links a:hover { opacity: 0.8; }
        .footer-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; max-width: 500px; }
        .footer-center h2 { font-size: 48px; font-weight: bold; margin: 0; letter-spacing: 2px; }
        .footer-center::after { content: ''; display: block; width: 100%; height: 2px; background: white; margin-top: 15px; }
        .footer-copy { position: absolute; right: 0; bottom: 0; font-size: 12px; color: #E2E8F0; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .header-container { padding: 15px 20px; }
            .mobile-menu-btn { display: block; }
            .header-search { width: 100%; }
            .header-search input { width: 100%; }
            
            .sidebar-col { width: 100%; padding: 20px; border-right: none; border-bottom: 1px solid var(--border); display: none; }
            .sidebar-col.mobile-active { display: block; }
            .widget { position: static; }
            
            .main-col { padding: 20px; }
            .hero-concept { padding: 40px 20px; border-radius: 16px; }
            .hero-concept h1 { font-size: 24px; letter-spacing: 1px; }
            .feature-grid { grid-template-columns: 1fr; gap: 15px; }
            
            .article-container { padding: 30px 20px; border-radius: 16px; }
            .article-title { font-size: 24px; }
            
            .footer-container { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; min-height: auto; }
            .footer-links { position: static; align-items: center; }
            .footer-center { position: static; transform: none; width: 80%; }
            .footer-center h2 { font-size: 36px; }
            .footer-copy { position: static; }
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <header>
        <div class="header-container">
            <div class="logo-area">
                <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <a href="media.html" class="logo">
                    <img src="/mapon-logo.png" alt="MapOn">
                </a>
            </div>
            <div class="header-search">
                <input type="text" id="headerSearchInput" placeholder="記事を検索...">
                <button onclick="searchBlogsHeader()"><i class="fa-solid fa-search"></i></button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar on Left -->
        <aside class="sidebar-col" id="sidebar-area" style="display:none;">
            <div class="widget">
                <h3><i class="fa-solid fa-layer-group"></i> カテゴリー</h3>
                <ul class="category-list">
                    <li><a href="?cat=グルメ・飲食店"><i class="fa-solid fa-utensils"></i> グルメ・飲食店 <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i></a></li>
                    <li><a href="?cat=整体"><i class="fa-solid fa-spa"></i> 整体 <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i></a></li>
                    <li><a href="?cat=美容"><i class="fa-solid fa-scissors"></i> 美容 <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i></a></li>
                </ul>
            </div>
        </aside>

        <!-- Main Content on Right -->
        <main class="main-col" id="app">
            <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="https://www.msm-fund.com/" target="_blank">運営会社</a>
                <a href="https://www.msm-fund.com/legal" target="_blank">特商法の記載</a>
                <a href="mailto:contact@msm-fund.com">お問い合わせ</a>
            </div>
            <div class="footer-center">
                <h2>MapOn</h2>
            </div>
            <div class="footer-copy">
                Copyright &copy; MapOn. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script type="module">
        import { supabase } from './supabase-config.js';

        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        const categoryFilter = urlParams.get('cat');
        const searchFilter = urlParams.get('q');

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar-area');
            if (sidebar.style.display === 'none' || !sidebar.classList.contains('mobile-active')) {
                sidebar.style.display = 'block';
                sidebar.classList.add('mobile-active');
            } else {
                sidebar.classList.remove('mobile-active');
                if (window.innerWidth <= 900) {
                    sidebar.style.display = 'none';
                }
            }
        }

        async function init() {
            if (window.innerWidth > 900) {
                document.getElementById('sidebar-area').style.display = 'block';
            }
            if (articleId) {
                await loadArticle(articleId);
            } else {
                await loadArticleList();
            }
        }

        // リサイズ時のサイドバー表示制御
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar-area');
            if (window.innerWidth > 900) {
                sidebar.style.display = 'block';
                sidebar.classList.remove('mobile-active');
            } else if (!sidebar.classList.contains('mobile-active')) {
                sidebar.style.display = 'none';
            }
        });

        window.searchBlogsHeader = function() {
            const q = document.getElementById('headerSearchInput').value.trim();
            if(q) window.location.href = '?q=' + encodeURIComponent(q);
        }

        async function loadArticleList() {
            let query = supabase.from('blogs').select('*').order('created_at', { ascending: false });
            
            if (categoryFilter) {
                query = query.contains('tags', [categoryFilter]);
            }
            if (searchFilter) {
                query = query.or(`title.ilike.%${searchFilter}%,content.ilike.%${searchFilter}%`);
            }

            const { data, error } = await query;
            
            let html = '';

            // TOPページ（フィルタなし）はブログ一覧を出さず、スタイリッシュなLPデザインにする
            if (!categoryFilter && !searchFilter) {
                html += `
                <div class="hero-concept">
                    <h1>お店の「本当の魅力」を、地図に乗せて届ける。</h1>
                    <p>MapOn Mediaは、地域の隠れた名店から話題のスポットまで、MEOのプロが厳選したお店のリアルな魅力をお届けするローカル発見メディアです。</p>
                    
                    <div class="feature-grid">
                        <div class="feature-card">
                            <i class="fa-solid fa-store"></i>
                            <h3>リアルな魅力</h3>
                            <p>足を運んだからこそ分かる、お店の空気感やこだわりを丁寧にレポート。</p>
                        </div>
                        <div class="feature-card">
                            <i class="fa-solid fa-map-location-dot"></i>
                            <h3>地図から発見</h3>
                            <p>MEOのノウハウを活かし、あなたの現在地から最高のお店を見つけ出します。</p>
                        </div>
                        <div class="feature-card">
                            <i class="fa-solid fa-star"></i>
                            <h3>プロの厳選</h3>
                            <p>数ある店舗の中から、本当に価値のある体験を提供してくれるお店だけをピックアップ。</p>
                        </div>
                    </div>
                </div>
                <div style="text-align:center; padding:50px; color:#718096; background:#F7FAFC; border-radius:16px;">
                    <i class="fa-solid fa-arrow-left" style="font-size:24px; margin-bottom:15px; color:#A0AEC0;"></i><br>
                    左のカテゴリーから記事をお探しください。
                </div>
                `;
                app.innerHTML = html;
                return;
            }

            if (error || !data || data.length === 0) {
                app.innerHTML = '<div style="padding:50px; text-align:center; background:white; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.05);"><h2 style="margin-bottom:10px;">記事が見つかりませんでした</h2><p style="color:#718096;">別のキーワードやカテゴリーでお試しください。</p></div>';
                return;
            }

            html += '<div class="blog-grid">';
            data.forEach(blog => {
                const category = (blog.tags && blog.tags.length > 0) ? blog.tags[0] : 'お知らせ';
                const date = blog.published_date || blog.created_at.split('T')[0];
                const img = blog.image_url || 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=800';
                
                html += `
                    <a href="?id=${blog.id}" class="blog-card">
                        <img src="${img}" alt="" class="card-img">
                        <div class="card-content">
                            <span class="category-tag">${category}</span>
                            <h2 class="card-title">${blog.title}</h2>
                            <div class="card-meta">
                                <span><i class="fa-solid fa-pen-nib"></i> ${blog.author_name}</span>
                                <span><i class="fa-regular fa-clock"></i> ${date}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            html += '</div>';
            app.innerHTML = html;
        }

        async function loadArticle(id) {
            const { data: blog, error } = await supabase.from('blogs').select('*').eq('id', id).single();
            
            if (error || !blog) {
                app.innerHTML = '<p>記事が見つかりませんでした。</p>';
                return;
            }

            // --- 構造化データ（JSON-LD）の自動生成と埋め込み（SEOの裏側アピール） ---
            if(blog.store_name) {
                const schemaData = {
                    "@context": "https://schema.org",
                    "@type": "LocalBusiness",
                    "name": blog.store_name,
                    "image": blog.image_url || "https://www.mapon-meo.com/mapon-logo.png",
                    "address": {
                        "@type": "PostalAddress",
                        "streetAddress": blog.address || ""
                    },
                    "telephone": blog.phone || "",
                    "url": window.location.href
                };
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.text = JSON.stringify(schemaData);
                document.head.appendChild(script);
            }

            // タイトルの変更
            document.title = blog.title + " | MapOn Media";

            const category = (blog.tags && blog.tags.length > 0) ? blog.tags[0] : 'お知らせ';
            const date = blog.published_date || blog.created_at.split('T')[0];
            const img = blog.image_url ? `<img src="${blog.image_url}" class="article-cover" alt="">` : '';

            // 店舗カードHTML生成
            let storeCardHtml = '';
            if (blog.store_name) {
                const mapQuery = encodeURIComponent(blog.store_name + ' ' + (blog.address || ''));
                storeCardHtml = `
                    <div class="store-card">
                        <h3><i class="fa-solid fa-store"></i> 紹介した店舗の情報</h3>
                        <ul class="store-info-list">
                            <li><i class="fa-solid fa-tag"></i> <div><strong>店舗名：</strong>${blog.store_name}</div></li>
                            ${blog.address ? `<li><i class="fa-solid fa-location-dot"></i> <div><strong>住所：</strong>${blog.address}</div></li>` : ''}
                            ${blog.phone ? `<li><i class="fa-solid fa-phone"></i> <div><strong>電話番号：</strong>${blog.phone}</div></li>` : ''}
                        </ul>
                        <a href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" class="btn-reserve"><i class="fa-solid fa-map-location-dot"></i> Googleマップで見る・予約する</a>
                    </div>
                `;
            }

            app.innerHTML = `
                <article class="article-container">
                    <div class="article-header">
                        <h1 class="article-title">${blog.title}</h1>
                    </div>
                    ${img}
                    <div class="article-content">
                        ${blog.content}
                    </div>
                    
                    <div style="margin-top: 30px; text-align: right;">
                        <span class="category-tag">${category}</span>
                    </div>
                    
                    ${storeCardHtml}

                    <div class="author-box">
                        <div class="author-avatar"><i class="fa-solid fa-user"></i></div>
                        <div class="author-info">
                            <h4>この記事を書いた人： ${blog.author_name}</h4>
                            <p>MapOnメディア公認ライター / 店舗の魅力を全力でお届けします。</p>
                        </div>
                    </div>
                </article>
            `;
        }

        init();
    </script>
</body>
</html>
