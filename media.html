<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapOn Media - お店の魅力を届ける</title>
    <link rel="icon" href="mapon-logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2B6CB0;
            --primary-hover: #2C5282;
            --bg-main: #FFFFFF;
            --bg-sub: #F7FAFC;
            --text-main: #2D3748;
            --text-muted: #718096;
            --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        body { background-color: var(--bg-sub); color: var(--text-main); line-height: 1.6; }

        /* Header */
        header { background: var(--bg-main); box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 35px; }
        
        /* Container */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; min-height: 70vh; }

        /* Blog List */
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .blog-card { background: var(--bg-main); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: transform 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; border: 1px solid var(--border); }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #EDF2F7; }
        .card-content { padding: 20px; }
        .category-tag { display: inline-block; background: #EBF8FF; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }

        /* Single Blog View */
        .article-container { background: var(--bg-main); border-radius: 24px; padding: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        .article-header { margin-bottom: 40px; text-align: center; }
        .article-title { font-size: 32px; font-weight: 900; line-height: 1.5; margin: 15px 0 20px; color: #1A202C; }
        .article-meta { font-size: 14px; color: var(--text-muted); display: flex; justify-content: center; gap: 20px; }
        .article-cover { width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 40px; background: #EDF2F7; }
        
        .article-content { font-size: 16px; line-height: 1.8; color: #4A5568; }
        .article-content h2 { font-size: 24px; color: #2D3748; margin: 40px 0 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
        .article-content img { max-width: 100%; border-radius: 12px; margin: 20px 0; }

        /* Store Card & Author Area */
        .store-card { background: #F7FAFC; border: 2px solid #E2E8F0; border-radius: 16px; padding: 30px; margin-top: 50px; }
        .store-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #2D3748; display:flex; align-items:center; gap:10px; }
        .store-info-list { list-style: none; margin-bottom: 25px; }
        .store-info-list li { margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; font-size: 15px; color: #4A5568; }
        .store-info-list i { color: var(--primary); margin-top: 4px; }
        
        .btn-reserve { display: block; width: 100%; text-align: center; background: linear-gradient(135deg, #3182CE, #2B6CB0); color: white; padding: 15px; border-radius: 12px; font-weight: 700; text-decoration: none; transition: 0.3s; font-size: 16px; }
        .btn-reserve:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(49, 130, 206, 0.3); }

        .author-box { display: flex; align-items: center; gap: 15px; margin-top: 40px; padding-top: 30px; border-top: 1px dashed var(--border); }
        .author-avatar { width: 50px; height: 50px; background: #EDF2F7; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #A0AEC0; }
        .author-info h4 { font-size: 15px; font-weight: 700; color: #2D3748; }
        .author-info p { font-size: 12px; color: var(--text-muted); }

        /* Loader */
        .loader { text-align: center; padding: 50px; color: var(--primary); font-size: 24px; }

        @media (max-width: 768px) {
            .article-container { padding: 30px 20px; }
            .article-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="/media.html" class="logo">
                <img src="/mapon-logo.png" alt="MapOn">
            </a>
        </div>
    </header>

    <div class="container" id="app">
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function init() {
            if (articleId) {
                await loadArticle(articleId);
            } else {
                await loadArticleList();
            }
        }

        async function loadArticleList() {
            const { data, error } = await supabase.from('blogs').select('*').order('created_at', { ascending: false });
            
            if (error || !data) {
                app.innerHTML = '<p>記事が見つかりませんでした。</p>';
                return;
            }

            let html = '<div class="blog-grid">';
            data.forEach(blog => {
                const category = (blog.tags && blog.tags.length > 0) ? blog.tags[0] : 'お知らせ';
                const date = blog.published_date || blog.created_at.split('T')[0];
                const img = blog.image_url || 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=800';
                
                html += `
                    <a href="?id=${blog.id}" class="blog-card">
                        <img src="${img}" alt="" class="card-img">
                        <div class="card-content">
                            <span class="category-tag">${category}</span>
                            <h2 class="card-title">${blog.title}</h2>
                            <div class="card-meta">
                                <span><i class="fa-solid fa-pen-nib"></i> ${blog.author_name}</span>
                                <span><i class="fa-regular fa-clock"></i> ${date}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            html += '</div>';
            app.innerHTML = html;
        }

        async function loadArticle(id) {
            const { data: blog, error } = await supabase.from('blogs').select('*').eq('id', id).single();
            
            if (error || !blog) {
                app.innerHTML = '<p>記事が見つかりませんでした。</p>';
                return;
            }

            // --- 構造化データ（JSON-LD）の自動生成と埋め込み（SEOの裏側アピール） ---
            if(blog.store_name) {
                const schemaData = {
                    "@context": "https://schema.org",
                    "@type": "LocalBusiness",
                    "name": blog.store_name,
                    "image": blog.image_url || "https://www.mapon-meo.com/mapon-logo.png",
                    "address": {
                        "@type": "PostalAddress",
                        "streetAddress": blog.address || ""
                    },
                    "telephone": blog.phone || "",
                    "url": window.location.href
                };
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.text = JSON.stringify(schemaData);
                document.head.appendChild(script);
            }

            // タイトルの変更
            document.title = blog.title + " | MapOn Media";

            const category = (blog.tags && blog.tags.length > 0) ? blog.tags[0] : 'お知らせ';
            const date = blog.published_date || blog.created_at.split('T')[0];
            const img = blog.image_url ? `<img src="${blog.image_url}" class="article-cover" alt="">` : '';

            // 店舗カードHTML生成
            let storeCardHtml = '';
            if (blog.store_name) {
                const mapQuery = encodeURIComponent(blog.store_name + ' ' + (blog.address || ''));
                storeCardHtml = `
                    <div class="store-card">
                        <h3><i class="fa-solid fa-store"></i> 紹介した店舗の情報</h3>
                        <ul class="store-info-list">
                            <li><i class="fa-solid fa-tag"></i> <div><strong>店舗名：</strong>${blog.store_name}</div></li>
                            ${blog.address ? `<li><i class="fa-solid fa-location-dot"></i> <div><strong>住所：</strong>${blog.address}</div></li>` : ''}
                            ${blog.phone ? `<li><i class="fa-solid fa-phone"></i> <div><strong>電話番号：</strong>${blog.phone}</div></li>` : ''}
                        </ul>
                        <a href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" class="btn-reserve"><i class="fa-solid fa-map-location-dot"></i> Googleマップで見る・予約する</a>
                    </div>
                `;
            }

            app.innerHTML = `
                <article class="article-container">
                    <div class="article-header">
                        <span class="category-tag">${category}</span>
                        <h1 class="article-title">${blog.title}</h1>
                        <div class="article-meta">
                            <span><i class="fa-regular fa-clock"></i> ${date}</span>
                            <span><i class="fa-solid fa-pen-nib"></i> ${blog.author_name}</span>
                        </div>
                    </div>
                    ${img}
                    <div class="article-content">
                        ${blog.content}
                    </div>
                    
                    ${storeCardHtml}

                    <div class="author-box">
                        <div class="author-avatar"><i class="fa-solid fa-user"></i></div>
                        <div class="author-info">
                            <h4>この記事を書いた人： ${blog.author_name}</h4>
                            <p>MapOnメディア公認ライター / 店舗の魅力を全力でお届けします。</p>
                        </div>
                    </div>
                </article>
            `;
        }

        init();
    </script>
</body>
</html>
