<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム | MapOn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #2D3748;
            --text-muted: #718096;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items:center;
            gap: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item:hover {
            border-color: var(--primary);
            background: #F0F7FF;
        }

        .menu-item.selected {
            border-color: var(--primary);
            background: #F0F7FF;
            box-shadow: 0 0 0 2px var(--primary);
        }

        .menu-photo {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #EDF2F7;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #CBD5E0;
        }

        .menu-info {
            flex: 1;
        }

        .menu-name {
            font-weight: 700;
            font-size: 16px;
        }

        .menu-price {
            color: var(--primary);
            font-weight: 700;
        }

        .staff-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .staff-item {
            text-align: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .staff-item:hover, .staff-item.selected {
            border-color: var(--primary);
            background: #F0F7FF;
        }

        .staff-photo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: #EDF2F7;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #CBD5E0;
        }

        .btn-submit {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 30px;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

    <div class="container">
        <header class="header">
            <h1 class="dynamic-store-name">テスト店舗</h1>
            <p style="color: var(--text-muted); font-size: 14px;">ご希望のコースとスタッフを選択してください</p>
        </header>

        <section id="step-menu" class="card" style="animation: fadeIn 0.4s ease;">
            <h2 class="section-title"><i class="fa-solid fa-list-check"></i> メニューを選択</h2>
            <div id="menu-list">
                <!-- JSで挿入 -->
            </div>
        </section>

        <section id="step-staff" class="card" style="animation: fadeIn 0.5s ease; display:none;">
            <h2 class="section-title"><i class="fa-solid fa-user-check"></i> スタッフを選択</h2>
            <div id="staff-list" class="staff-grid">
                <!-- JSで挿入 -->
            </div>
        </section>

        <section id="step-info" class="card" style="animation: fadeIn 0.6s ease; display:none;">
            <h2 class="section-title"><i class="fa-solid fa-calendar-check"></i> 日時とお客様情報</h2>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">ご希望の日時</label>
                <input type="datetime-local" class="form-control" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">お名前</label>
                <input type="text" placeholder="例：山田 太郎" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:12px; font-weight:bold; margin-bottom:5px;">電話番号</label>
                <input type="tel" placeholder="例：09000000000" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
            </div>
            <button class="btn-submit" onclick="submitReservation()">予約を確定する</button>
        </section>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        async function init() {
            try {
                // 店舗名の取得
                const userDataStr = localStorage.getItem('currentUser');
                if(userDataStr) {
                    const userData = JSON.parse(userDataStr);
                    document.querySelectorAll('.dynamic-store-name').forEach(el => el.textContent = userData.company_name);
                }

                // メニュー読み込み
                const { data: menus } = await supabase.from('menus').select('*');
                const menuContainer = document.getElementById('menu-list');
                if (menus && menus.length > 0) {
                    menus.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div class="menu-photo">${m.photo_url ? `<img src="${m.photo_url}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">` : '<i class="fa-solid fa-image"></i>'}</div>
                            <div class="menu-info">
                                <div class="menu-name">${m.item_name}</div>
                                <div style="font-size:12px; color:var(--text-muted);">${m.description || ''}</div>
                                <div class="menu-price">¥${m.price.toLocaleString()}</div>
                            </div>
                        `;
                        div.onclick = () => selectMenu(div);
                        menuContainer.appendChild(div);
                    });
                } else {
                    menuContainer.innerHTML = '<p style="text-align:center; padding:20px;">現在、予約可能なメニューがありません。</p>';
                }

                // スタッフ読み込み
                const { data: staff } = await supabase.from('staff').select('*');
                const staffContainer = document.getElementById('staff-list');
                if (staff && staff.length > 0) {
                    staff.forEach(s => {
                        const div = document.createElement('div');
                        div.className = 'staff-item';
                        div.innerHTML = `
                            <div class="staff-photo">${s.photo_url ? `<img src="${s.photo_url}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : '<i class="fa-solid fa-user"></i>'}</div>
                            <div style="font-weight:bold; font-size:14px;">${s.name}</div>
                            <div style="font-size:11px; color:var(--text-muted);">${s.strength || ''}</div>
                        `;
                        div.onclick = () => selectStaff(div);
                        staffContainer.appendChild(div);
                    });
                }

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error(error);
                alert('初期化に失敗しました。');
            }
        }

        function selectMenu(el) {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('step-staff').style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function selectStaff(el) {
            document.querySelectorAll('.staff-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('step-info').style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.submitReservation = function() {
            alert('ご予約ありがとうございました！(実際にはSupabaseのreservationsテーブルに即時保存されます)');
            location.href = '/';
        }

        window.onload = init;
    </script>
</body>
</html>
