<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【プランC】MapOn モニター お申し込み</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #059669;
            --primary-hover: #047857;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(5, 150, 105, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(5, 150, 105, 0.05), transparent 40%);
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin: 20px;
        }

        .header {
            background: linear-gradient(135deg, #065f46, #10b981);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
        }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
        .plan-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(4px);
            margin-bottom: 15px;
        }
        .header h1 { font-size: 20px; font-weight: 700; line-height: 1.4; }

        .form-body {
            padding: 40px 30px;
        }

        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-control:focus {
            background: white;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #059669, #34d399);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(5, 150, 105, 0.3);
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        
        .success-icon {
            width: 80px; height: 80px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="header">
            <div class="logo">MapOn</div>
            <div class="plan-badge"><i class="fa-solid fa-flask"></i> MapOn モニタープラン (C)</div>
            <h1>システム無料モニター お申し込み</h1>
        </div>
        
        <div class="form-body" id="signupForm">
            <p style="font-size:13px; color:var(--text-sub); margin-bottom:25px; line-height:1.6;">
                モニターアカウントを発行いたします。以下の項目を入力して登録を完了させてください。<br>ご登録後、すぐに高機能な管理画面をお試しいただけます。
            </p>

            <div class="form-group">
                <label>店舗名 / 法人名</label>
                <input type="text" id="companyName" class="form-control" placeholder="例: 焼肉 新宿本店">
            </div>
            
            <div class="form-group">
                <label>ログイン用メールアドレス</label>
                <input type="email" id="emailUrl" class="form-control" placeholder="example@shop.com">
            </div>
            
            <div class="form-group">
                <label>お好きなパスワード (半角英数字)</label>
                <input type="password" id="passwordVal" class="form-control" placeholder="••••••••">
            </div>

            <button class="btn-submit" id="submitBtn" onclick="registerClient()">
                <span>アカウントを作成して開始</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- 成功時の画面 -->
    <div class="success-overlay" id="successView">
        <div class="success-icon"><i class="fa-solid fa-check"></i></div>
        <h2 style="font-size:24px; font-weight:800; margin-bottom:15px; color:#1e293b;">登録が完了しました！</h2>
        <p style="color:#64748b; font-size:15px; line-height:1.6; margin-bottom:30px;">
            アカウントの発行が正常に完了しました。<br>
            登録したメールアドレスとパスワードで<br>ログイン画面にアクセスしてください。
        </p>
        <button class="btn-submit" style="width:auto; padding:12px 30px;" onclick="window.location.href='login.html'">ログイン画面へ進む</button>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        window.registerClient = async function() {
            const companyNode = document.getElementById('companyName');
            const emailNode = document.getElementById('emailUrl');
            const passNode = document.getElementById('passwordVal');
            const btn = document.getElementById('submitBtn');

            const company_name = companyNode.value.trim();
            const email = emailNode.value.trim();
            const temp_password = passNode.value.trim();
            const plan = 'C'; // プランC

            if(!company_name || !email || !temp_password) {
                alert("全ての項目を入力してください。");
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 処理中...';
            btn.disabled = true;

            const { data, error } = await supabase.from('clients').insert([
                { 
                    company_name: company_name, 
                    email: email, 
                    temp_password: temp_password,
                    plan: plan,
                    status: '稼働中'
                }
            ]);

            if (error) {
                console.error("登録エラー:", error);
                alert("登録に失敗しました。メールアドレスが既に使われている可能性があります。\n詳細: " + error.message);
                btn.innerHTML = '<span>アカウントを作成して開始</span> <i class="fa-solid fa-arrow-right"></i>';
                btn.disabled = false;
                return;
            }

            // 成功画面を表示
            document.getElementById('successView').style.display = 'flex';
        }
    </script>
</body>
</html>
