<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapOnメディア - 執筆ルーム</title>
    <link rel="icon" href="mapon-logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Quill.js for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    <style>
        :root {
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --primary-orange: #ED8936;
            --text-main: #2D3748;
            --border-color: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }

        .sidebar { width: 250px; background: #FFFFFF; padding: 30px 20px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .msm-logo { font-weight: 800; font-size: 26px; color: var(--primary-orange); letter-spacing: 1px; }
        .msm-logo img { width: 150px; }
        
        .nav-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; color: #718096; text-decoration: none; font-weight: 600; display: block; transition: 0.2s; }
        .nav-item.active { background-color: #FFFAF0; color: var(--primary-orange); }
        .nav-item:hover { background-color: #F7FAFC; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 700; }

        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding: 30px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #4A5568; border-bottom: 2px solid #F1F5F9; padding-bottom: 10px; display:flex; align-items:center; gap:8px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: #4A5568; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); outline: none; font-size: 14px; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-orange); box-shadow: 0 0 0 3px rgba(237, 137, 54, 0.1); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-primary { background: linear-gradient(135deg, #DD6B20, #ED8936); border: none; color: white; padding: 12px 25px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(237, 137, 54, 0.2); }
        
        /* Quill Editor customization */
        .ql-toolbar { border-radius: 8px 8px 0 0 !important; border-color: var(--border-color) !important; background: #F8FAFC; }
        .ql-container { border-radius: 0 0 8px 8px !important; border-color: var(--border-color) !important; min-height: 400px; font-size: 16px; font-family: 'Noto Sans JP', sans-serif; }
        
        .seo-badge { display: inline-block; background: #E6FFFA; color: #319795; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 10px; vertical-align: middle; }
        
        /* Tag Input Styles */
        .tags-input-container { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; border: 1px solid var(--border-color); border-radius: 8px; background: #fff; min-height: 46px; }
        .tag-pill { background: #EBF8FF; color: #3182CE; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .tag-remove { cursor: pointer; color: #63B3ED; font-weight: bold; transition: 0.2s; }
        .tag-remove:hover { color: #2B6CB0; }
        .tag-input { border: none; outline: none; flex: 1; min-width: 120px; font-size: 14px; padding: 4px; }
        
        /* Thumbnail Preview */
        .thumbnail-preview { width: 100%; height: 150px; border-radius: 8px; border: 2px dashed var(--border-color); display: flex; justify-content: center; align-items: center; overflow: hidden; background: #F7FAFC; cursor: pointer; transition: 0.2s; position: relative; }
        .thumbnail-preview:hover { border-color: var(--primary-orange); }
        .thumbnail-preview img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-placeholder { color: #A0AEC0; font-size: 13px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; border-radius: 12px; width: 400px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; color: #2D3748; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-cancel { background: #E2E8F0; color: #4A5568; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Sidebar Article List */
        .article-list-container { margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .article-list-container h3 { font-size: 14px; color: #4A5568; margin-bottom: 15px; }
        .search-mini { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; font-size: 12px; }
        .article-item { background: #F7FAFC; border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .article-item:hover { border-color: var(--primary-orange); }
        .article-item-title { font-size: 12px; font-weight: bold; color: #2D3748; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .article-item-meta { font-size: 10px; color: #718096; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="msm-logo">MapOn Media</div>
            <div style="font-size:11px; color:#A0AEC0; margin-top:5px; font-weight:bold;">WRITER PANEL</div>
        </div>
        <a href="media-admin.html" class="nav-item active"><i class="fa-solid fa-pen-nib"></i> 記事を書く</a>
        <a href="master-dashboard.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> 管理画面に戻る</a>
        <a href="#" class="nav-item" onclick="writerLogout()" style="margin-top:auto; color:#E53E3E;"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</a>

        <div class="article-list-container">
            <h3><i class="fa-solid fa-list"></i> 過去の記事一覧</h3>
            <input type="text" id="articleSearch" class="search-mini" placeholder="タイトル・執筆者で検索..." oninput="filterArticleList()">
            <div id="sidebarArticleList" style="max-height: 400px; overflow-y: auto;">
                <!-- JSで動的に追加 -->
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>新しい記事を書く</h1>
            <button class="btn-primary" onclick="publishBlog()"><i class="fa-solid fa-paper-plane"></i> 記事を公開する</button>
        </header>

        <div class="card">
            <h2><i class="fa-solid fa-heading"></i> 基本情報</h2>
            <div class="form-group">
                <label>記事のタイトル</label>
                <input type="text" id="blogTitle" class="form-control" placeholder="例: 新宿で本当におすすめしたい焼肉店『A焼肉』徹底レビュー！">
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>カテゴリー（タグ）</label>
                    <select id="blogCategory" class="form-control">
                        <option value="グルメ">グルメ・飲食店</option>
                        <option value="整体・サロン">整体・美容サロン</option>
                        <option value="ライフスタイル">ライフスタイル</option>
                        <option value="ノウハウ">MEOノウハウ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>サムネイル画像</label>
                    <div class="thumbnail-preview" onclick="document.getElementById('thumbnailFile').click()">
                        <div class="thumbnail-placeholder" id="thumbnailPlaceholder">
                            <i class="fa-solid fa-image" style="font-size:24px;"></i>
                            画像を選択（クリック）
                        </div>
                        <img id="thumbnailImg" style="display:none;">
                    </div>
                    <input type="file" id="thumbnailFile" accept="image/*" style="display:none;">
                    <input type="hidden" id="blogThumbnail">
                </div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>執筆者名 (記事の最後に表示されます)</label>
                    <input type="text" id="authorName" class="form-control" placeholder="例: MEOアドバイザー 浦田">
                </div>
                <div class="form-group">
                    <label>執筆日</label>
                    <input type="date" id="publishedDate" class="form-control">
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0;"><i class="fa-solid fa-file-lines"></i> 記事本文</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" style="padding: 8px 15px; font-size: 12px; background: #718096;" onclick="openDividerModal()"><i class="fa-solid fa-minus"></i> 分割線を挿入</button>
                    <button class="btn-primary" style="padding: 8px 15px; font-size: 12px; background: #3182CE;" onclick="openButtonModal()"><i class="fa-solid fa-link"></i> リンクボタンを挿入</button>
                </div>
            </div>
            <div id="editor-container"></div>
        </div>

        <div class="card" style="border: 1px solid #3182CE; background: #EBF8FF;">
            <h2 style="color: #2B6CB0; border-bottom: 2px solid #BEE3F8;"><i class="fa-solid fa-robot"></i> SEO自動生成用データ <span class="seo-badge">裏側でGoogleにアピールします</span></h2>
            <p style="font-size: 13px; color: #2C5282; margin-bottom: 15px; line-height: 1.5;">
                ここで入力した店舗情報は、記事の最後に「店舗カード」として綺麗に表示されます。同時に、Googleのロボットに「この記事はこのお店のことですよ」と直接伝えるための見えないコード（JSON-LD）が自動生成されます。
            </p>
            <div class="grid-2">
                <div class="form-group">
                    <label>対象の店舗名</label>
                    <input type="text" id="seoStoreName" class="form-control" placeholder="例: 焼肉 新宿本店">
                </div>
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="text" id="seoPhone" class="form-control" placeholder="例: 03-1234-5678">
                </div>
            </div>
            <div class="form-group">
                <label>店舗の住所</label>
                <input type="text" id="seoAddress" class="form-control" placeholder="例: 東京都新宿区○○1-2-3">
            </div>
            
            <div class="form-group" style="margin-top:20px; border-top:1px dashed #CBD5E0; padding-top:20px;">
                <label>Google Map埋め込みコード（iframe） <span style="font-size:11px; color:#718096; font-weight:normal;">※任意。記事の最後に実際の地図を表示できます</span></label>
                <textarea id="seoMapIframe" class="form-control" rows="3" placeholder='<iframe src="https://www.google.com/maps/embed?pb=..." width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>'></textarea>
                <p style="font-size:11px; color:#A0AEC0; margin-top:5px;">Googleマップの「共有」＞「地図を埋め込む」からHTMLをコピーして貼り付けてください。</p>
            </div>

            <div class="form-group">
                <label>狙うSEOキーワード <span style="font-size:11px; color:#718096; font-weight:normal;">※入力してEnterを押すと追加されます</span></label>
                <div class="tags-input-container" id="tagsContainer">
                    <input type="text" id="tagInput" class="tag-input" placeholder="例: 新宿 焼肉">
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Button Insertion -->
    <div class="modal-overlay" id="buttonModal">
        <div class="modal">
            <h3>ボタンの挿入</h3>
            <div class="form-group">
                <label>名前 (ボタンに表示するテキスト)</label>
                <input type="text" id="btnText" class="form-control" placeholder="例: ご予約はこちら">
            </div>
            <div class="form-group">
                <label>リンク (URL)</label>
                <input type="text" id="btnLink" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>ボタンの色</label>
                <input type="color" id="btnColor" class="form-control" value="#ED8936" style="height: 40px; padding: 5px;">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeButtonModal()">キャンセル</button>
                <button class="btn-primary" onclick="insertButtonImage()">挿入</button>
            </div>
        </div>
    </div>

    <!-- Modal for Divider Insertion -->
    <div class="modal-overlay" id="dividerModal">
        <div class="modal">
            <h3>分割線の挿入</h3>
            <div class="form-group">
                <label>線の種類</label>
                <select id="dividerStyle" class="form-control">
                    <option value="solid">直線</option>
                    <option value="dashed">破線（長めの点線）</option>
                    <option value="dotted">点線</option>
                </select>
            </div>
            <div class="form-group">
                <label>線の色</label>
                <input type="color" id="dividerColor" class="form-control" value="#CBD5E0" style="height: 40px; padding: 5px;">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDividerModal()">キャンセル</button>
                <button class="btn-primary" onclick="insertDividerImage()">挿入</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        // 認証チェック
        let editingArticleId = null; // 編集中の記事ID
        let allArticles = []; // サイドバー用
        let tagsList = [];

        async function checkAuth() {
            const { data, error } = await supabase.auth.getSession();
            if (error || !data.session) {
                window.location.href = '/media-login.html';
                return;
            }
            document.getElementById('authorName').value = data.session.user.email;
            document.getElementById('publishedDate').valueAsDate = new Date();
            
            // ログイン成功時に記事一覧を読み込む
            loadSidebarArticles();
        }
        checkAuth();

        // 記事一覧の読み込み
        async function loadSidebarArticles() {
            const { data, error } = await supabase.from('blogs').select('*').order('created_at', { ascending: false });
            if (!error && data) {
                allArticles = data;
                renderSidebarArticles(data);
            }
        }

        function renderSidebarArticles(articles) {
            const container = document.getElementById('sidebarArticleList');
            container.innerHTML = '';
            
            // 月ごとにグループ化
            const grouped = {};
            articles.forEach(a => {
                const date = new Date(a.published_date || a.created_at);
                const month = `${date.getFullYear()}年${date.getMonth() + 1}月`;
                if(!grouped[month]) grouped[month] = [];
                grouped[month].push(a);
            });

            for (const [month, list] of Object.entries(grouped)) {
                container.innerHTML += `<div style="font-size:11px; color:#A0AEC0; font-weight:bold; margin:10px 0 5px;">${month}</div>`;
                list.forEach(article => {
                    const dateStr = (article.published_date || article.created_at).split('T')[0];
                    container.innerHTML += `
                        <div class="article-item" onclick="loadArticleForEdit('${article.id}')">
                            <div class="article-item-title">${article.title}</div>
                            <div class="article-item-meta">
                                <span>${dateStr}</span>
                                <span>${article.author_name}</span>
                            </div>
                        </div>
                    `;
                });
            }
        }

        window.filterArticleList = function() {
            const q = document.getElementById('articleSearch').value.toLowerCase();
            const filtered = allArticles.filter(a => 
                (a.title && a.title.toLowerCase().includes(q)) || 
                (a.author_name && a.author_name.toLowerCase().includes(q))
            );
            renderSidebarArticles(filtered);
        };

        window.loadArticleForEdit = function(id) {
            const article = allArticles.find(a => a.id === id);
            if (!article) return;
            
            editingArticleId = id;
            document.getElementById('blogTitle').value = article.title || '';
            document.getElementById('authorName').value = article.author_name || '';
            if(article.published_date) document.getElementById('publishedDate').value = article.published_date;
            if(article.tags && article.tags.length > 0) document.getElementById('blogCategory').value = article.tags[0];
            
            if (article.image_url) {
                document.getElementById('thumbnailImg').src = article.image_url;
                document.getElementById('thumbnailImg').style.display = 'block';
                document.getElementById('thumbnailPlaceholder').style.display = 'none';
                document.getElementById('blogThumbnail').value = article.image_url;
            }
            
            document.getElementById('seoStoreName').value = article.store_name || '';
            document.getElementById('seoPhone').value = article.phone || '';
            document.getElementById('seoAddress').value = article.address || '';
            if (article.map_iframe !== undefined) document.getElementById('seoMapIframe').value = article.map_iframe || '';
            
            tagsList = article.seo_keywords || [];
            renderTags();
            
            quill.root.innerHTML = article.content || '';
            
            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = '<i class="fa-solid fa-upload"></i> 更新する';
        };

        // 画像アップロードのプレビュー処理
        document.getElementById('thumbnailFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxSize = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > maxSize) {
                        height = Math.round((height * maxSize) / width);
                        width = maxSize;
                    } else if (height > maxSize) {
                        width = Math.round((width * maxSize) / height);
                        height = maxSize;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    document.getElementById('thumbnailImg').src = base64;
                    document.getElementById('thumbnailImg').style.display = 'block';
                    document.getElementById('thumbnailPlaceholder').style.display = 'none';
                    document.getElementById('blogThumbnail').value = base64;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // タグ入力処理
        const tagInput = document.getElementById('tagInput');
        const tagsContainer = document.getElementById('tagsContainer');

        function renderTags() {
            document.querySelectorAll('.tag-pill').forEach(el => el.remove());
            tagsList.forEach((tag, index) => {
                const pill = document.createElement('div');
                pill.className = 'tag-pill';
                pill.innerHTML = `${tag} <span class="tag-remove" onclick="removeTag(${index})">×</span>`;
                tagsContainer.insertBefore(pill, tagInput);
            });
        }

        window.removeTag = function(index) {
            tagsList.splice(index, 1);
            renderTags();
        };

        tagInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInput.value.trim().replace(',', '');
                if (val && !tagsList.includes(val)) {
                    tagsList.push(val);
                    renderTags();
                }
                tagInput.value = '';
            }
        });

        // Quillエディタの初期化
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'ここから魅力的な記事を書き始めましょう...',
            modules: {
                imageResize: {
                    displayStyles: { backgroundColor: 'black', border: 'none', color: 'white' },
                    modules: [ 'Resize', 'DisplaySize', 'Toolbar' ]
                },
                toolbar: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'align': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // モーダル制御
        window.openButtonModal = function() { document.getElementById('buttonModal').style.display = 'flex'; };
        window.closeButtonModal = function() { document.getElementById('buttonModal').style.display = 'none'; };
        window.openDividerModal = function() { document.getElementById('dividerModal').style.display = 'flex'; };
        window.closeDividerModal = function() { document.getElementById('dividerModal').style.display = 'none'; };

        window.insertButtonImage = function() {
            const text = document.getElementById('btnText').value.trim();
            const url = document.getElementById('btnLink').value.trim();
            const color = document.getElementById('btnColor').value;
            if (!text || !url) { alert('名前とリンクを入力してください。'); return; }
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 20px sans-serif';
            const textWidth = ctx.measureText(text).width;
            canvas.width = textWidth + 60;
            canvas.height = 50;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(0, 0, canvas.width, canvas.height, 25);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 2);
            const base64 = canvas.toDataURL('image/png');
            const range = quill.getSelection(true) || { index: quill.getLength() - 1 };
            quill.insertEmbed(range.index, 'image', base64);
            quill.setSelection(range.index, 1);
            quill.format('link', url);
            quill.setSelection(range.index + 1);
            closeButtonModal();
            document.getElementById('btnText').value = '';
            document.getElementById('btnLink').value = '';
        };

        window.insertDividerImage = function() {
            const style = document.getElementById('dividerStyle').value;
            const color = document.getElementById('dividerColor').value;
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 10;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            if (style === 'dashed') ctx.setLineDash([15, 10]);
            else if (style === 'dotted') ctx.setLineDash([4, 4]);
            else ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(800, 5);
            ctx.stroke();
            const base64 = canvas.toDataURL('image/png');
            const range = quill.getSelection(true) || { index: quill.getLength() - 1 };
            quill.insertEmbed(range.index, 'image', base64);
            quill.setSelection(range.index + 1);
            closeDividerModal();
        };

        window.writerLogout = async function() {
            await supabase.auth.signOut();
            window.location.href = '/media-login.html';
        };

        window.publishBlog = async function() {
            const title = document.getElementById('blogTitle').value.trim();
            const category = document.getElementById('blogCategory').value;
            const thumbnail = document.getElementById('blogThumbnail').value.trim();
            const author = document.getElementById('authorName').value.trim();
            const date = document.getElementById('publishedDate').value;
            const storeName = document.getElementById('seoStoreName').value.trim();
            const phone = document.getElementById('seoPhone').value.trim();
            const address = document.getElementById('seoAddress').value.trim();
            const mapIframe = document.getElementById('seoMapIframe').value.trim();
            
            let contentHTML = quill.root.innerHTML;
            if (mapIframe) {
                contentHTML += `<div class="embedded-map" style="margin-top: 30px;">${mapIframe}</div>`;
            }

            if(!title || contentHTML === '<p><br></p>') {
                alert('タイトルと本文は必須です。');
                return;
            }

            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 公開中...';
            btn.disabled = true;

            // Supabaseへ保存
            const { error } = await supabase.from('blogs').insert([
                {
                    title: title,
                    content: contentHTML,
                    author_name: author || 'MapOn 編集部',
                    published_date: date,
                    store_name: storeName,
                    phone: phone,
                    address: address,
                    tags: [category],
                    seo_keywords: tagsList,
                    image_url: thumbnail
                }
            ]);

            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 記事を公開する';
            btn.disabled = false;

            if (error) {
                console.error(error);
                alert('記事の公開に失敗しました: ' + error.message);
            } else {
                alert('記事が公開されました！');
                // フォームリセット
                document.getElementById('blogTitle').value = '';
                document.getElementById('seoStoreName').value = '';
                document.getElementById('seoPhone').value = '';
                document.getElementById('seoAddress').value = '';
                document.getElementById('seoMapIframe').value = '';
                document.getElementById('thumbnailImg').style.display = 'none';
                document.getElementById('thumbnailPlaceholder').style.display = 'flex';
                document.getElementById('blogThumbnail').value = '';
                tagsList = [];
                renderTags();
                quill.root.innerHTML = '';
            }
        };
    </script>
</body>
</html>
