<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マスター管理 - MSM</title>
    <!-- 強固なセキュリティロック：マスター権限がない人は強制的にログインへ戻す -->
    <script>
        const isMaster = localStorage.getItem('masterAdmin');
        if (!isMaster) {
            window.location.replace('login.html');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F4F7FE;
            --card-bg: #FFFFFF;
            --primary-blue: #4285F4;
            --text-main: #2B3674;
            --border-color: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }

        .sidebar { width: 260px; background-color: #1A202C; padding: 30px 20px; display: flex; flex-direction: column; color: white; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .msm-logo { font-weight: 800; font-size: 30px; letter-spacing: 2px; }
        
        .nav-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; color: #A0AEC0; text-decoration: none; font-weight: 600; display: block; }
        .nav-item.active { background-color: #2D3748; color: white; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

        .card { background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; }
        
        .client-table { width: 100%; border-collapse: collapse; }
        .client-table th { padding: 15px; text-align: left; background: #F8FAFC; border-bottom: 2px solid var(--border-color); color:#4A5568; font-size:14px; }
        .client-table td { padding: 15px; border-bottom: 1px solid var(--border-color); vertical-align: middle; font-size:15px; font-weight:500; }
        
        .btn-action { background: var(--primary-blue); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-decoration:none; display:inline-block; }
        .btn-action:hover { opacity: 0.9; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; background:#E6F4EA; color:#34A853; font-weight:bold; }

        /* --- レスポンシブ用（スマホ・タブレット向け） --- */
        .mobile-only-header { display: none; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 9998; backdrop-filter: blur(2px); }
        .mobile-overlay.active { display: block; animation: fadeIn 0.3s ease; }
        @media (max-width: 768px) {
            body { flex-direction: column; padding-bottom: 20px; }
            .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; flex-direction: column; padding: 30px 20px; z-index: 9999; border-left: 1px solid #2D3748; border-right: none; border-top: none; box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); justify-content: flex-start; }
            .sidebar.active { right: 0; }
            .sidebar .logo-area, .sidebar .logout-btn { display: block; }
            .nav-item { padding: 15px; margin-bottom: 10px; text-align: left; display:flex; flex-direction:row; align-items:center; flex:none; font-size:14px; }
            .nav-item i { display: inline-block; margin-right: 12px; margin-bottom: 0; font-size: 1.2rem; }

            .main-content { padding: 15px; }
            .mobile-only-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
            .header { display: none; } /* PC用ビッグヘッダーを隠す */
            
            .card { padding: 15px; }
            .card > div:first-child { flex-direction: column; align-items: flex-start !important; gap: 10px; } 
            .card h2 { font-size: 18px; }
            
            .client-table { display: block; width: 100%; overflow-x: auto; white-space: nowrap; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

    <nav class="sidebar">
        <div class="logo-area">
            <div class="msm-logo" style="font-size:24px; font-weight:900; background:linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">MapOn</div>
            <div style="font-size:11px; color:#A0AEC0; margin-top:5px;">MASTER DASHBOARD</div>
        </div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-users"></i> 全クライアント一覧</a>
        
        <div style="margin-top:20px; padding:0 15px;">
            <p style="font-size:11px; color:#A0AEC0; margin-bottom:10px; font-weight:bold;">申し込みフォームURL取得</p>
            <button class="btn-action" style="background:#4A5568; margin-bottom:8px; width:100%; font-size:11px;" onclick="copySignupUrl('signup-a.html')">運用代行プラン</button>
            <button class="btn-action" style="background:var(--primary-blue); margin-bottom:8px; width:100%; font-size:11px;" onclick="copySignupUrl('signup-b.html')">MapOn</button>
            <button class="btn-action" style="background:#34A853; width:100%; font-size:11px;" onclick="copySignupUrl('signup-c.html')">MapOn(モニター)</button>
        </div>

        <a href="login.html" class="nav-item" style="margin-top:auto;"><i class="fa-solid fa-arrow-right-from-bracket"></i> ログアウト</a>
    </nav>

    <main class="main-content">
        <!-- モバイル専用ヘッダー -->
        <div class="mobile-only-header">
            <div class="msm-logo" style="font-size:24px; margin:0; color:var(--text-main); font-weight:800;">MapOn <span style="font-size:10px; color:var(--text-muted);">MASTER</span></div>
            <button onclick="toggleMobileMenu()" style="background:none; border:none; font-size:26px; color:var(--text-main); cursor:pointer;"><i class="fa-solid fa-bars"></i></button>
        </div>

        <header class="header">
            <h1>本部（マスター）管理パネル</h1>
        </header>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center; flex-wrap:wrap; gap:15px;">
                <h2 style="margin:0;">契約クライアント一覧</h2>
                <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
                    <!-- 絞り込みタブ -->
                    <select id="planFilterSelect" style="padding:10px; border-radius:8px; border:1px solid var(--border-color); font-weight:bold; color:var(--primary-blue); outline:none; cursor:pointer;" onchange="alert('データベースに「プラン種別」を追加後、このフィルターが稼働します！')">
                        <option value="all">すべてのクライアント</option>
                        <option value="agency">運用代行プランのみ</option>
                        <option value="mapon">MapOn (有料/モニター)のみ</option>
                    </select>
                    <!-- 検索バー -->
                    <div style="position:relative;">
                        <input type="text" id="clientSearchInput" placeholder="店舗名/法人名/メールを検索..." style="padding:10px 15px 10px 35px; border-radius:8px; border:1px solid var(--border-color); width:260px; font-size:14px; outline:none;" onkeyup="searchClients()">
                        <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#A0AEC0;"></i>
                    </div>
                    <!-- 追加ボタン -->
                    <button onclick="openAddClientModal()" style="background:#4A5568; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold; white-space:nowrap;"><i class="fa-solid fa-plus"></i> 新規クライアント追加</button>
                </div>
            </div>

            <table class="client-table" id="clientTable">
                <thead>
                    <tr>
                        <th>店舗名 / 法人名</th>
                        <th>メールアドレス</th>
                        <th>パスワード</th>
                        <th>口コミ収集数</th>
                        <th>ステータス</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="clientTableBody">
                    <!-- DBからデータが挿入されます -->
                </tbody>
            </table>
        </div>

        <!-- クライアント追加モーダル -->
        <div id="addClientModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
            <div class="card" style="width:400px; padding:30px;">
                <h3 style="margin-bottom:20px;">新規クライアント追加</h3>
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">店舗名 / 法人名</label>
                    <input type="text" id="newCompanyName" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">メールアドレス</label>
                    <input type="email" id="newEmail" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom:25px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">仮パスワード</label>
                    <input type="text" id="newPassword" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px;">
                    <button onclick="document.getElementById('addClientModal').style.display='none'" style="padding:10px 15px; border-radius:8px; border:none; background:#F8FAFC; color:#64748B; font-weight:bold; cursor:pointer;">キャンセル</button>
                    <button id="saveClientBtn" style="padding:10px 15px; border-radius:8px; border:none; background:#4285F4; color:white; font-weight:bold; cursor:pointer;">DBに登録</button>
                </div>
            </div>
        </div>

        <!-- BLOG ADD MODAL (運用代行プラン用) -->
        <div id="addBlogModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center; animation: fadeIn 0.3s ease;">
            <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; position:relative;">
                <h2 style="font-size:18px; margin-bottom:20px; border-bottom:2px solid #F4F7FE; padding-bottom:10px;"><i class="fa-solid fa-pen-nib" style="color:#059669;"></i> ブログ記事の追加</h2>
                <input type="hidden" id="blogTargetClientId">
                <input type="hidden" id="blogTargetClientBlogs">
                
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">年月</label>
                    <input type="text" id="newBlogMonth" class="form-control" placeholder="例: 2026年4月" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">ブログのタイトル</label>
                    <input type="text" id="newBlogTitle" class="form-control" placeholder="タイトルを入力" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom:25px;">
                    <label style="display:block; font-size:13px; font-weight:bold; margin-bottom:5px;">リンク先 URL</label>
                    <input type="url" id="newBlogUrl" class="form-control" placeholder="https://" style="width:100%; padding:10px; border:1px solid #E2E8F0; border-radius:8px; outline:none;">
                </div>
                
                <div style="display:flex; justify-content:flex-end; gap:10px;">
                    <button onclick="document.getElementById('addBlogModal').style.display='none'" style="padding:10px 15px; border-radius:8px; border:none; background:#F8FAFC; color:#64748B; font-weight:bold; cursor:pointer;">キャンセル</button>
                    <button id="saveBlogBtn" style="padding:10px 15px; border-radius:8px; border:none; background:#059669; color:white; font-weight:bold; cursor:pointer;">記事を追加する</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        function toggleMobileMenu() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('mobileOverlay').classList.toggle('active');
        }

        // クライアントを検索する機能
        function searchClients() {
            let input = document.getElementById('clientSearchInput').value.toLowerCase();
            let rows = document.getElementsByClassName('client-row');
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].innerText.toLowerCase();
                rows[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        // モーダルを開く処理をグローバル関数のままにしておく（onclick動作用）
        window.openAddClientModal = function() {
            document.getElementById('newCompanyName').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('addClientModal').style.display = 'flex';
        };

        // サインアップURLをコピーする処理
        window.copySignupUrl = function(filename) {
            // 現在のURL（master-dashboard.html等）からベースとなるパスを取得して生成
            const url = window.location.href;
            const baseUrl = url.substring(0, url.lastIndexOf('/') + 1);
            const targetUrl = baseUrl + filename;

            navigator.clipboard.writeText(targetUrl).then(() => {
                alert(`申し込みフォームのURLをコピーしました！\n\nコピーされたURL:\n${targetUrl}`);
            }).catch(err => {
                alert(`コピーに失敗しました。以下のURLを手動でコピーしてください。\n\n${targetUrl}`);
            });
        };
    </script>

    <!-- Supabase連携のリアルタイム通信スクリプト -->
    <script type="module">
        import { supabase } from './supabase-config.js';

        // ページ読み込み時にDBからクライアントを読み込む
        async function loadClients() {
            const tableBody = document.getElementById('clientTableBody');
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">データベースから読み込み中...</td></tr>';

            const { data, error } = await supabase.from('clients').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error("DB読み込みエラー:", error);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">エラーが発生しました</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#A0AEC0;">まだ登録されているクライアントがいません</td></tr>';
                return;
            }

            data.forEach(client => {
                const tr = document.createElement('tr');
                tr.className = 'client-row';
                
                // ステータスバッジの小技
                const statusHtml = client.status === '稼働中' 
                    ? '<span class="status-badge">稼働中</span>' 
                    : '<span class="status-badge" style="background:#FEECEB; color:#EA4335;">一時停止</span>';

                // 運用代行プランの場合は会社名をクリックできるように
                let companyDisplay = `<i class="fa-solid fa-shop" style="color:var(--text-muted);"></i> ${client.company_name}`;
                if (client.plan === 'A') {
                    // ブログ情報をJSON文字列にしてonclickで渡す（クォーティングをエスケープ）
                    const blogsStr = encodeURIComponent(JSON.stringify(client.blogs || []));
                    companyDisplay = `<a href="javascript:void(0)" onclick="openBlogModal('${client.id}', '${blogsStr}')" style="color:var(--primary-blue); font-weight:bold; text-decoration:underline;">
                        <i class="fa-solid fa-shop"></i> ${client.company_name} <span class="status-badge" style="background:#FEF3C7; color:#D97706; padding:2px 4px; font-size:10px;">ブログ追加</span>
                    </a>`;
                }

                const clientEncoded = encodeURIComponent(JSON.stringify(client));
                
                tr.innerHTML = `
                    <td class="search-target">${companyDisplay}</td>
                    <td class="search-target">${client.email}</td>
                    <td style="font-family:monospace; color:#4A5568;">${client.temp_password || '未設定'}</td>
                    <td>- 件</td>
                    <td>${statusHtml}</td>
                    <td><a href="javascript:void(0)" onclick="masterLoginAs('${clientEncoded}')" class="btn-action"><i class="fa-solid fa-right-to-bracket"></i> 管理画面に入る</a></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // DBに新しいクライアントを保存する
        document.getElementById('saveClientBtn').addEventListener('click', async () => {
            const company_name = document.getElementById('newCompanyName').value;
            const email = document.getElementById('newEmail').value;
            const temp_password = document.getElementById('newPassword').value;

            if(!company_name || !email) {
                alert("店舗名とメールアドレスは必須です！");
                return;
            }

            const btn = document.getElementById('saveClientBtn');
            btn.innerText = '登録中...';
            btn.disabled = true;

            const { error } = await supabase.from('clients').insert([
                { company_name: company_name, email: email, temp_password: temp_password }
            ]);

            btn.innerText = 'DBに登録';
            btn.disabled = false;

            if (error) {
                alert("エラーが発生しました: " + error.message);
            } else {
                alert("新しいクライアントをデータベースに登録しました！");
                document.getElementById('addClientModal').style.display = 'none';
                loadClients(); // 再読み込みして画面更新
            }
        });

        // --- ブログ登録ロジック ---
        window.masterLoginAs = function(clientEncoded) {
            const client = JSON.parse(decodeURIComponent(clientEncoded));
            // 本人としてログイン済みのフラグ立て（localStorageのcurrentUserを書き換え）
            localStorage.setItem('currentUser', JSON.stringify(client));
            // ダッシュボードへリダイレクト
            window.location.href = 'index.html';
        };

        window.openBlogModal = function(clientId, blogsStrEncoded) {
            document.getElementById('blogTargetClientId').value = clientId;
            document.getElementById('blogTargetClientBlogs').value = decodeURIComponent(blogsStrEncoded);
            document.getElementById('newBlogMonth').value = '';
            document.getElementById('newBlogTitle').value = '';
            document.getElementById('newBlogUrl').value = '';
            document.getElementById('addBlogModal').style.display = 'flex';
        };

        document.getElementById('saveBlogBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveBlogBtn');
            const clientId = document.getElementById('blogTargetClientId').value;
            let blogsArr = JSON.parse(document.getElementById('blogTargetClientBlogs').value || '[]');
            
            const month = document.getElementById('newBlogMonth').value.trim();
            const title = document.getElementById('newBlogTitle').value.trim();
            const url = document.getElementById('newBlogUrl').value.trim();

            if(!month || !title || !url) {
                alert("全ての項目を入力してください。");
                return;
            }

            // 新規ブログを追加
            blogsArr.push({ month, title, url });

            btn.innerText = '保存中...';
            btn.disabled = true;

            const { error } = await supabase.from('clients').update({ blogs: blogsArr }).eq('id', clientId);

            if (error) {
                console.error("更新エラー:", error);
                alert("エラーが発生しました: " + error.message);
                btn.innerText = '記事を追加する';
                btn.disabled = false;
                return;
            }

            alert("ブログ記事を追加しました！");
            document.getElementById('addBlogModal').style.display = 'none';
            btn.innerText = '記事を追加する';
            btn.disabled = false;
            
            // リロード
            loadClients();
        });

        window.onload = loadClients;
    </script>
</body>
</html>
